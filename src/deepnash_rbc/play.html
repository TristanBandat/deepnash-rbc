<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RECON · DeepNash RBC</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#121922; --panel2:#0e151d; --line:#1f2c38;
    --ink:#cdd9e3; --muted:#74879a; --faint:#46586a;
    --you:#5fd0d8;            /* your side: cool signal */
    --enemy:#e0644b;          /* enemy intel: ember */
    --recon:#f0b429;          /* sense sweep: phosphor */
    --sq-light:#26333d; --sq-dark:#1a242d;
    --ok:#74c69d;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:1060px;margin:0 auto;padding:22px 20px 40px}
  header{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line);
    padding-bottom:14px;margin-bottom:20px}
  header h1{font-size:15px;letter-spacing:.32em;font-weight:700;margin:0;text-transform:uppercase}
  header h1 .dot{color:var(--recon)}
  header .sub{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.04em}
  .layout{display:grid;grid-template-columns:minmax(320px,560px) 1fr;gap:26px;align-items:start}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}

  /* board */
  .board-frame{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;box-shadow:0 18px 50px -28px #000}
  .ranks-files{display:grid;grid-template-columns:18px 1fr;grid-template-rows:1fr 18px;gap:4px}
  .board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
    aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .filelabels,.ranklabels{display:grid;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .filelabels{grid-column:2;grid-template-columns:repeat(8,1fr);text-align:center;padding-top:3px}
  .ranklabels{grid-row:1;grid-template-rows:repeat(8,1fr);align-items:center;justify-items:center}
  .cell{position:relative;display:flex;align-items:center;justify-content:center;
    font-size:min(7vw,40px);line-height:1;cursor:default;user-select:none;transition:background .12s}
  .cell.light{background:var(--sq-light)} .cell.dark{background:var(--sq-dark)}
  .cell .pc{position:relative;z-index:2;filter:drop-shadow(0 1px 1px #0008)}
  .cell.own .pc{color:#eaf6f7}
  .cell.own::after{content:"";position:absolute;inset:14% ;border:1.5px solid var(--you);
    border-radius:7px;opacity:.55;z-index:1}
  .cell.enemy .pc{color:var(--enemy)}
  .cell.enemy::after{content:"";position:absolute;inset:16%;border:1.5px dashed var(--enemy);
    border-radius:7px;opacity:.5;z-index:1}
  .cell .age{position:absolute;bottom:2px;right:3px;font-family:var(--mono);font-size:8px;
    color:var(--enemy);opacity:.7;z-index:3}
  /* interaction states */
  .cell.actionable{cursor:pointer}
  .cell.actionable:hover{background:#2c3c48}
  .cell.recon-preview{box-shadow:inset 0 0 0 2px var(--recon)}
  .cell.recon-preview::before{content:"";position:absolute;inset:0;background:var(--recon);opacity:.10}
  .cell.recon-flash{animation:flash .6s ease-out}
  @keyframes flash{0%{box-shadow:inset 0 0 0 3px var(--recon);background:#3a3725}100%{}}
  .cell.sel{box-shadow:inset 0 0 0 3px var(--you)}
  .cell.target{cursor:pointer}
  .cell.target::before{content:"";position:absolute;width:30%;height:30%;border-radius:50%;
    background:var(--you);opacity:.5;z-index:1}
  .cell.target.cap::before{width:78%;height:78%;border-radius:8px;background:transparent;
    border:2.5px solid var(--you);opacity:.6}
  @media (prefers-reduced-motion:reduce){.cell{transition:none}.cell.recon-flash{animation:none}}

  /* right rail */
  .rail{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
  .card h2{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
    margin:0 0 11px;font-weight:600}
  .status{font-size:14px;min-height:20px}
  .status .phase{font-weight:600}
  .status.sense .phase{color:var(--recon)} .status.move .phase{color:var(--you)}
  .status.over .phase{color:var(--ok)} .status.thinking .phase{color:var(--muted)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px}

  label.field{display:block;font-family:var(--mono);font-size:11px;color:var(--muted);
    margin:0 0 4px;letter-spacing:.04em}
  select,button{font-family:var(--sans);font-size:13px}
  select{width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 9px;margin-bottom:11px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:11px}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:1}
  .seg button{flex:1;background:var(--panel2);color:var(--muted);border:0;padding:8px;cursor:pointer}
  .seg button.on{background:var(--you);color:#04161a;font-weight:600}
  .check{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);cursor:pointer}
  .btn{display:block;width:100%;background:var(--recon);color:#1a1402;border:0;border-radius:9px;
    padding:11px;font-weight:700;letter-spacing:.04em;cursor:pointer}
  .btn:hover{filter:brightness(1.06)} .btn.ghost{background:transparent;color:var(--muted);
    border:1px solid var(--line)} .btn.ghost:hover{color:var(--ink)}
  .btn[disabled]{opacity:.4;cursor:not-allowed}

  .log{font-family:var(--mono);font-size:11.5px;line-height:1.7;max-height:260px;overflow:auto;
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .log div{color:var(--muted);white-space:pre-wrap}
  .log div::before{content:"› ";color:var(--faint)}
  .log div.you{color:var(--you)} .log div.you::before{content:"› "}
  .log div.foe{color:var(--enemy)} .log div.recon{color:var(--recon)} .log div.end{color:var(--ok)}

  .legend{display:flex;gap:16px;font-family:var(--mono);font-size:10.5px;color:var(--muted);
    margin-top:10px;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:5px}
  .swatch{width:10px;height:10px;border-radius:3px;display:inline-block}

  /* promotion picker */
  .promo{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:20}
  .promo.show{display:flex}
  .promo .box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .promo h3{margin:0 0 12px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .promo .opts{display:flex;gap:10px}
  .promo .opts button{width:56px;height:56px;font-size:34px;background:var(--panel2);
    border:1px solid var(--line);border-radius:9px;color:var(--you);cursor:pointer}
  .promo .opts button:hover{background:#2c3c48}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>RECON<span class="dot">·</span>RBC</h1>
    <span class="sub">play your DeepNash checkpoints under fog of war</span>
  </header>

  <div class="layout">
    <div class="board-frame">
      <div class="ranks-files">
        <div class="ranklabels" id="ranklabels"></div>
        <div class="board" id="board"></div>
        <div></div>
        <div class="filelabels" id="filelabels"></div>
      </div>
      <div class="legend">
        <span><i class="swatch" style="background:var(--you)"></i>your pieces (known)</span>
        <span><i class="swatch" style="background:var(--enemy)"></i>enemy intel (may be stale)</span>
        <span><i class="swatch" style="background:var(--recon)"></i>sense sweep</span>
      </div>
    </div>

    <div class="rail">
      <div class="card">
        <h2>Status</h2>
        <div class="status" id="status"><span class="phase">Start a new game.</span></div>
        <div class="meta" id="meta"></div>
        <div class="row" style="margin-top:12px;margin-bottom:0">
          <button class="btn ghost" id="passBtn" style="display:none">Pass move</button>
        </div>
      </div>

      <div class="card">
        <h2>New game</h2>
        <label class="field">Checkpoint</label>
        <select id="ckpt"></select>
        <label class="field">You play</label>
        <div class="seg" id="colorSeg">
          <button data-c="white" class="on">White</button>
          <button data-c="black">Black</button>
        </div>
        <label class="check" style="margin-bottom:12px">
          <input type="checkbox" id="sample"> sample bot moves (vs. greedy)
        </label>
        <button class="btn" id="startBtn">Start game</button>
      </div>

      <div class="card">
        <h2>Recon log</h2>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>
</div>

<div class="promo" id="promo">
  <div class="box">
    <h3>Promote to</h3>
    <div class="opts" id="promoOpts"></div>
  </div>
</div>

<script>
const GLYPH={P:"♙",N:"♘",B:"♗",R:"♖",Q:"♕",K:"♔",p:"♟",n:"♞",b:"♝",r:"♜",q:"♛",k:"♚"};
const FILES="abcdefgh";
let S=null, sel=null, color="white", busy=false;

const $=id=>document.getElementById(id);
const sqName=s=>FILES[s%8]+(Math.floor(s/8)+1);
async function api(path,body){
  const r=await fetch(path,{method:body?"POST":"GET",headers:{"Content-Type":"application/json"},
    body:body?JSON.stringify(body):undefined});
  const j=await r.json(); if(!r.ok) throw new Error(j.error||"request failed"); return j;
}

// orientation: human's side at the bottom
function displayOrder(){
  const rows=[];
  for(let r=7;r>=0;r--){const row=[];for(let f=0;f<8;f++)row.push(r*8+f);rows.push(row);}
  if(color==="black"){rows.reverse();rows.forEach(r=>r.reverse());}
  return rows;
}

function render(){
  const board=$("board"); board.innerHTML="";
  const order=displayOrder();
  const bySq={}; (S?.squares||[]).forEach(q=>bySq[q.square]=q);
  for(const row of order) for(const s of row){
    const q=bySq[s]||{}; const cell=document.createElement("div");
    const dark=((s%8)+Math.floor(s/8))%2===0;          // a1 dark
    cell.className="cell "+(dark?"dark":"light"); cell.dataset.square=s;
    if(q.own){cell.classList.add("own");cell.innerHTML=`<span class="pc">${GLYPH[q.own]}</span>`;}
    else if(q.enemy){cell.classList.add("enemy");
      const op=Math.max(.3,.85-q.enemy.age*0.12);
      cell.innerHTML=`<span class="pc" style="opacity:${op}">${GLYPH[q.enemy.symbol]}</span>`+
        (q.enemy.age>0?`<span class="age">${q.enemy.age}</span>`:"");}
    wire(cell,s); board.appendChild(cell);
  }
  // labels follow orientation
  const fileOrder = color==="black" ? [...FILES].reverse() : [...FILES];
  $("filelabels").innerHTML=fileOrder.map(f=>`<div>${f}</div>`).join("");
  const rankOrder = color==="black" ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
  $("ranklabels").innerHTML=rankOrder.map(r=>`<div>${r}</div>`).join("");
  paintInteractive();
}

function paintInteractive(){
  if(!S||S.over) return;
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("actionable","target","cap","sel");
  });
  if(S.phase==="sense"){
    const ok=new Set(S.sense_actions||[]);
    document.querySelectorAll(".cell").forEach(c=>{
      if(ok.has(+c.dataset.square)) c.classList.add("actionable");
    });
  } else if(S.phase==="move"){
    const froms=S.moves||{};
    document.querySelectorAll(".cell").forEach(c=>{
      if(froms[c.dataset.square]) c.classList.add("actionable");
    });
    if(sel!=null){
      const cellSel=document.querySelector(`.cell[data-square="${sel}"]`);
      if(cellSel) cellSel.classList.add("sel");
      for(const m of (froms[sel]||[])){
        const t=document.querySelector(`.cell[data-square="${m.to}"]`);
        if(t){t.classList.add("target");
          if((S.squares.find(x=>x.square===m.to)||{}).enemy) t.classList.add("cap");}
      }
    }
  }
}

function wire(cell,s){
  cell.addEventListener("click",()=>onCell(s));
  cell.addEventListener("mouseenter",()=>{
    if(!S||S.phase!=="sense"||busy) return;
    if(!(S.sense_actions||[]).includes(s)) return;
    neighbors(s).forEach(n=>{
      const c=document.querySelector(`.cell[data-square="${n}"]`); if(c)c.classList.add("recon-preview");
    });
  });
  cell.addEventListener("mouseleave",()=>{
    document.querySelectorAll(".recon-preview").forEach(c=>c.classList.remove("recon-preview"));
  });
}
function neighbors(s){
  const f=s%8,r=Math.floor(s/8),out=[];
  for(let df=-1;df<=1;df++)for(let dr=-1;dr<=1;dr++){
    const nf=f+df,nr=r+dr; if(nf>=0&&nf<8&&nr>=0&&nr<8)out.push(nr*8+nf);
  } return out;
}

async function onCell(s){
  if(!S||busy||S.over) return;
  if(S.phase==="sense"){
    if(!(S.sense_actions||[]).includes(s)) return;
    busy=true;
    try{ const ns=await api("/api/sense",{square:s});
      flash(neighbors(s)); setState(ns);
    }catch(e){toast(e.message)} busy=false;
  } else if(S.phase==="move"){
    const froms=S.moves||{};
    if(froms[s]){ sel=(sel===s?null:s); paintInteractive(); return; }
    if(sel!=null){
      const opts=(froms[sel]||[]).filter(m=>m.to===s);
      if(opts.length===0) return;
      if(opts.length>1 && opts.some(o=>o.promotion)) return promote(opts);
      await sendMove(opts[0].uci);
    }
  }
}

function flash(squares){
  squares.forEach(n=>{const c=document.querySelector(`.cell[data-square="${n}"]`);
    if(c){c.classList.add("recon-flash");setTimeout(()=>c.classList.remove("recon-flash"),650);}});
}

function promote(opts){
  const box=$("promoOpts"); box.innerHTML="";
  const colorIsWhite=color==="white";
  for(const o of opts){
    const sym=colorIsWhite?o.promotion.toUpperCase():o.promotion;
    const b=document.createElement("button"); b.textContent=GLYPH[sym];
    b.onclick=async()=>{$("promo").classList.remove("show"); await sendMove(o.uci);};
    box.appendChild(b);
  }
  $("promo").classList.add("show");
}

async function sendMove(uci){
  busy=true; sel=null; setThinking();
  try{ const ns=await api("/api/move",{uci}); setState(ns);}
  catch(e){toast(e.message); refresh();} busy=false;
}
async function doPass(){ busy=true; sel=null; setThinking();
  try{ setState(await api("/api/move",{uci:null})); }catch(e){toast(e.message)} busy=false; }

function setThinking(){
  const st=$("status"); st.className="status thinking";
  st.innerHTML=`<span class="phase">Opponent is thinking…</span>`;
  $("passBtn").style.display="none";
  document.querySelectorAll(".cell").forEach(c=>c.classList.remove("actionable","target","cap","sel"));
}

function setState(ns){ S=ns; render(); renderStatus(); renderLog(); }

function renderStatus(){
  const st=$("status");
  if(S.over){
    st.className="status over";
    const msg=S.winner==="human"?"You win.":S.winner==="bot"?"Opponent wins.":"Draw.";
    st.innerHTML=`<span class="phase">${msg}</span>`;
    $("meta").textContent=S.reason?("reason: "+S.reason.toLowerCase()):"";
    $("passBtn").style.display="none"; return;
  }
  if(S.phase==="sense"){ st.className="status sense";
    st.innerHTML=`<span class="phase">Your move — choose a square to sense.</span>`;
    $("passBtn").style.display="none";
  } else if(S.phase==="move"){ st.className="status move";
    st.innerHTML=`<span class="phase">Now pick a piece and a destination.</span>`;
    $("passBtn").style.display="block";
  }
  $("meta").textContent=`clock ${S.seconds_left}s · you play ${S.human_color}`;
}

function renderLog(){
  const el=$("log"); el.innerHTML="";
  for(const line of (S.log||[])){
    const d=document.createElement("div");
    if(/^You /.test(line)) d.className="you";
    else if(/opponent/i.test(line)) d.className="foe";
    else if(/^Sensed/.test(line)) d.className="recon";
    else if(/Game over/.test(line)) d.className="end";
    d.textContent=line; el.appendChild(d);
  }
  el.scrollTop=el.scrollHeight;
}

function toast(m){ const st=$("status"); st.className="status";
  st.innerHTML=`<span class="phase" style="color:var(--enemy)">${m}</span>`; }

async function refresh(){ try{setState(await api("/api/state"));}catch(e){} }

// ---- new-game controls ----
$("colorSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  color=b.dataset.c;
  [...$("colorSeg").children].forEach(x=>x.classList.toggle("on",x===b));
});
$("passBtn").addEventListener("click",doPass);
$("startBtn").addEventListener("click",async()=>{
  busy=true;
  try{ setState(await api("/api/new",{checkpoint:$("ckpt").value,color,sample:$("sample").checked})); }
  catch(e){toast(e.message)} busy=false;
});

(async function init(){
  try{
    const {checkpoints}=await api("/api/checkpoints");
    const sel=$("ckpt");
    sel.innerHTML=`<option value="__random__">random (untrained)</option>`+
      checkpoints.map(c=>`<option value="${c}">${c}</option>`).join("");
  }catch(e){}
  render();
})();
</script>
</body>
</html>
